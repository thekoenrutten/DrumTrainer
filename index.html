<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DrumTrainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181a; --surface2: #222225; --border: #2e2e32;
    --accent: #e84545; --accent-dim: #e8454522; --accent-pulse: #e8454555;
    --green: #34d399; --green-dim: #34d39920;
    --text: #f0efea; --muted: #888785; --mono: "DM Mono", monospace; --serif: "Fraunces", serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--mono); min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding:0 0 40px; }
  header { width:100%; padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:12px; }
  .logo { font-family:var(--serif); font-size:28px; font-weight:700; color:var(--text); }
  .logo span { color:var(--accent); }
  .tagline { font-size:11px; color:var(--muted); letter-spacing:0.05em; }
  .main { width:100%; padding:24px 24px 0; display:flex; flex-direction:column; gap:20px; }
  .drop-zone { border:1.5px dashed var(--border); border-radius:14px; padding:32px 20px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; position:relative; overflow:hidden; }
  .drop-zone:hover,.drop-zone.drag-over { border-color:var(--accent); background:var(--accent-dim); }
  .drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-icon { width:40px; height:40px; margin:0 auto 12px; border-radius:10px; background:var(--surface2); display:flex; align-items:center; justify-content:center; }
  .drop-icon svg { width:20px; height:20px; color:var(--muted); }
  .drop-label { font-size:13px; color:var(--muted); line-height:1.6; }
  .drop-label strong { color:var(--text); font-weight:500; }
  .track-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px; display:none; flex-direction:column; gap:20px; }
  .track-card.visible { display:flex; }
  .track-header { display:flex; align-items:center; gap:12px; }
  .track-thumb { width:56px; height:56px; border-radius:12px; background:var(--surface2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .track-thumb svg { width:26px; height:26px; color:var(--accent); }
  .track-title { font-family:var(--serif); font-size:22px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .change-btn { margin-left:auto; background:none; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-family:var(--mono); font-size:11px; padding:5px 10px; cursor:pointer; flex-shrink:0; transition:border-color .15s,color .15s; position:relative; }
  .change-btn:hover { border-color:var(--text); color:var(--text); }
  .change-btn input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .waveform-wrap { position:relative; height:80px; cursor:pointer; }
  canvas#waveform { width:100%; height:80px; border-radius:8px; display:block; }
  .playhead { position:absolute; top:0; bottom:0; width:2px; background:var(--accent); border-radius:1px; pointer-events:none; left:0; }
  .loop-region { position:absolute; top:0; bottom:0; background:var(--accent); opacity:.15; pointer-events:none; display:none; border-radius:3px; }
  .time-row { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-top:-2px; }
  .controls { display:flex; align-items:center; justify-content:center; gap:28px; padding:8px 0; }
  .btn-circle { width:64px; height:64px; border-radius:50%; border:1px solid var(--border); background:none; color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color .15s,color .15s,background .15s; }
  .btn-circle:hover { border-color:var(--text); color:var(--text); }
  .btn-circle.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .btn-circle.waiting { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); animation:pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{background:var(--accent-dim)} 50%{background:var(--accent-pulse)} }
  .btn-circle svg { width:24px; height:24px; }
  .btn-play { width:88px; height:88px; border-radius:50%; border:none; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .1s,opacity .15s; }
  .btn-play:active { transform:scale(0.95); }
  .btn-play:disabled { opacity:.35; cursor:default; }
  .btn-play svg { width:34px; height:34px; }
  .loop-hint { font-size:13px; color:var(--muted); text-align:center; min-height:20px; transition:color .2s; padding:2px 0; }
  .loop-hint.active { color:var(--accent); }
  .section-label { font-size:11px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; margin-bottom:14px; }
  .tempo-display { display:flex; align-items:baseline; gap:6px; margin-bottom:14px; }
  .tempo-num { font-family:var(--serif); font-size:72px; font-weight:300; line-height:1; color:var(--text); font-style:italic; }
  .tempo-unit { font-size:14px; color:var(--muted); }
  input[type=range] { -webkit-appearance:none; width:100%; height:6px; border-radius:3px; background:var(--border); outline:none; margin-bottom:14px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:28px; height:28px; border-radius:50%; background:var(--accent); cursor:pointer; border:3px solid var(--bg); box-shadow:0 0 0 1px var(--accent); }
  .steps { display:flex; gap:8px; }
  .step-btn { flex:1; padding:12px 4px; border-radius:10px; border:1px solid var(--border); background:none; color:var(--muted); font-family:var(--mono); font-size:13px; cursor:pointer; transition:all .15s; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .step-btn .check { width:20px; height:20px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .step-btn.done { border-color:var(--green); color:var(--green); background:var(--green-dim); }
  .step-btn.done .check { border-color:var(--green); background:var(--green); }
  .step-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .step-btn.active .check { border-color:var(--accent); }
  .check-svg { width:10px; height:10px; display:none; }
  .step-btn.done .check-svg { display:block; }
  .step-btn.done .check-dot { display:none; }
  .check-dot { width:6px; height:6px; border-radius:50%; background:var(--border); }
  .progress-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:10px; }
  .progress-fill { height:100%; background:linear-gradient(90deg, var(--green), var(--accent)); border-radius:2px; transition:width .3s; width:0%; }
  .loading-bar { height:2px; background:var(--accent); border-radius:1px; width:0%; transition:width .15s; }
  .status-msg { font-size:12px; color:var(--muted); text-align:center; padding:4px 0; min-height:18px; }
  .status-msg.err { color:#f87171; }
</style>
</head>
<body>

<header>
  <div class="logo">Drum<span>Trainer</span></div>
  <div class="tagline">tempo trainer voor drummers</div>
</header>
<div class="main">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="audio/*,.mp3,.m4a,.aac,.wav,.ogg,.flac,.mp4">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/></svg>
    </div>
    <div class="drop-label"><strong>Kies een mp3 of audiobestand</strong><br>of sleep het hier naartoe</div>
  </div>

  <div class="track-card" id="trackCard">
    <div class="track-header">
      <div class="track-thumb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/></svg>
      </div>
      <div style="min-width:0;flex:1">
        <div class="track-title" id="trackTitle">—</div>
        <div class="track-sub" id="trackDur">—</div>
      </div>
      <button class="change-btn">ander bestand<input type="file" id="fileInput2" accept="audio/*,.mp3,.m4a,.aac,.wav,.ogg,.flac,.mp4"></button>
    </div>

    <div class="loading-bar" id="loadingBar"></div>
    <div class="status-msg" id="statusMsg"></div>

    <div class="waveform-wrap" id="waveformWrap">
      <canvas id="waveform"></canvas>
      <div class="loop-region" id="loopRegion"></div>
      <div class="playhead" id="playhead"></div>
    </div>
    <div class="time-row">
      <span id="timeCurrent">0:00</span>
      <span id="timeTotal">0:00</span>
    </div>

    <div class="controls">
      <button class="btn-circle" id="btnBack" title="10 seconden terug">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="11 17 6 12 11 7"/><path d="M18 17l-5-5 5-5"/></svg>
      </button>
      <button class="btn-play" id="btnPlay" disabled>
        <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
      </button>
      <button class="btn-circle" id="btnLoop" title="Loop instellen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
      </button>
    </div>

    <div class="loop-hint" id="loopHint"></div>

    <div>
      <div class="section-label">tempo</div>
      <div class="tempo-display">
        <span class="tempo-num" id="tempoNum">70</span>
        <span class="tempo-unit">%</span>
      </div>
      <input type="range" id="tempoSlider" min="40" max="100" value="100" step="5">
      <div class="steps" id="steps"></div>
      <div class="progress-track" style="margin-top:10px">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</div>

class FifoSampleBuffer {
  constructor() {
    this._vector = new Float32Array();
    this._position = 0;
    this._frameCount = 0;
  }
  get vector() {
    return this._vector;
  }
  get position() {
    return this._position;
  }
  get startIndex() {
    return this._position * 2;
  }
  get frameCount() {
    return this._frameCount;
  }
  get endIndex() {
    return (this._position + this._frameCount) * 2;
  }
  clear() {
    this.receive(this._frameCount);
    this.rewind();
  }
  put(numFrames) {
    this._frameCount += numFrames;
  }
  putSamples(samples, position, numFrames = 0) {
    position = position || 0;
    const sourceOffset = position * 2;
    if (!(numFrames >= 0)) {
      numFrames = (samples.length - sourceOffset) / 2;
    }
    const numSamples = numFrames * 2;
    this.ensureCapacity(numFrames + this._frameCount);
    const destOffset = this.endIndex;
    this.vector.set(samples.subarray(sourceOffset, sourceOffset + numSamples), destOffset);
    this._frameCount += numFrames;
  }
  putBuffer(buffer, position, numFrames = 0) {
    position = position || 0;
    if (!(numFrames >= 0)) {
      numFrames = buffer.frameCount - position;
    }
    this.putSamples(buffer.vector, buffer.position + position, numFrames);
  }
  receive(numFrames) {
    if (!(numFrames >= 0) || numFrames > this._frameCount) {
      numFrames = this.frameCount;
    }
    this._frameCount -= numFrames;
    this._position += numFrames;
  }
  receiveSamples(output, numFrames = 0) {
    const numSamples = numFrames * 2;
    const sourceOffset = this.startIndex;
    output.set(this._vector.subarray(sourceOffset, sourceOffset + numSamples));
    this.receive(numFrames);
  }
  extract(output, position = 0, numFrames = 0) {
    const sourceOffset = this.startIndex + position * 2;
    const numSamples = numFrames * 2;
    output.set(this._vector.subarray(sourceOffset, sourceOffset + numSamples));
  }
  ensureCapacity(numFrames = 0) {
    const minLength = parseInt(numFrames * 2);
    if (this._vector.length < minLength) {
      const newVector = new Float32Array(minLength);
      newVector.set(this._vector.subarray(this.startIndex, this.endIndex));
      this._vector = newVector;
      this._position = 0;
    } else {
      this.rewind();
    }
  }
  ensureAdditionalCapacity(numFrames = 0) {
    this.ensureCapacity(this._frameCount + numFrames);
  }
  rewind() {
    if (this._position > 0) {
      this._vector.set(this._vector.subarray(this.startIndex, this.endIndex));
      this._position = 0;
    }
  }
}

class AbstractFifoSamplePipe {
  constructor(createBuffers) {
    if (createBuffers) {
      this._inputBuffer = new FifoSampleBuffer();
      this._outputBuffer = new FifoSampleBuffer();
    } else {
      this._inputBuffer = this._outputBuffer = null;
    }
  }
  get inputBuffer() {
    return this._inputBuffer;
  }
  set inputBuffer(inputBuffer) {
    this._inputBuffer = inputBuffer;
  }
  get outputBuffer() {
    return this._outputBuffer;
  }
  set outputBuffer(outputBuffer) {
    this._outputBuffer = outputBuffer;
  }
  clear() {
    this._inputBuffer.clear();
    this._outputBuffer.clear();
  }
}

class RateTransposer extends AbstractFifoSamplePipe {
  constructor(createBuffers) {
    super(createBuffers);
    this.reset();
    this._rate = 1;
  }
  set rate(rate) {
    this._rate = rate;

  reset() {
    this.slopeCount = 0;
    this.prevSampleL = 0;
    this.prevSampleR = 0;
  }

    const result = new RateTransposer();
    result.rate = this._rate;
    return result;
  }
  process() {
    const numFrames = this._inputBuffer.frameCount;
    this._outputBuffer.ensureAdditionalCapacity(numFrames / this._rate + 1);
    const numFramesOutput = this.transpose(numFrames);
    this._inputBuffer.receive();
    this._outputBuffer.put(numFramesOutput);
  }
  transpose(numFrames = 0) {
    if (numFrames === 0) {
      return 0;
    }
    const src = this._inputBuffer.vector;
    const srcOffset = this._inputBuffer.startIndex;
    const dest = this._outputBuffer.vector;
    const destOffset = this._outputBuffer.endIndex;
    let used = 0;
    let i = 0;
    while (this.slopeCount < 1.0) {
      dest[destOffset + 2 * i] = (1.0 - this.slopeCount) * this.prevSampleL + this.slopeCount * src[srcOffset];
      dest[destOffset + 2 * i + 1] = (1.0 - this.slopeCount) * this.prevSampleR + this.slopeCount * src[srcOffset + 1];
      i = i + 1;
      this.slopeCount += this._rate;
    }
    this.slopeCount -= 1.0;
    if (numFrames !== 1) {
      out: while (true) {
        while (this.slopeCount > 1.0) {
          this.slopeCount -= 1.0;
          used = used + 1;
          if (used >= numFrames - 1) {
            break out;
          }
        }
        const srcIndex = srcOffset + 2 * used;
        dest[destOffset + 2 * i] = (1.0 - this.slopeCount) * src[srcIndex] + this.slopeCount * src[srcIndex + 2];
        dest[destOffset + 2 * i + 1] = (1.0 - this.slopeCount) * src[srcIndex + 1] + this.slopeCount * src[srcIndex + 3];
        i = i + 1;
        this.slopeCount += this._rate;
      }
    }
    this.prevSampleL = src[srcOffset + 2 * numFrames - 2];
    this.prevSampleR = src[srcOffset + 2 * numFrames - 1];
    return i;
  }
}

class FilterSupport {
  constructor(pipe) {
    this._pipe = pipe;
  }
  get pipe() {
    return this._pipe;
  }
  get inputBuffer() {
    return this._pipe.inputBuffer;
  }
  get outputBuffer() {
    return this._pipe.outputBuffer;
  }
  fillInputBuffer() {
    throw new Error('fillInputBuffer() not overridden');
  }
  fillOutputBuffer(numFrames = 0) {
    while (this.outputBuffer.frameCount < numFrames) {
      const numInputFrames = 8192 * 2 - this.inputBuffer.frameCount;
      this.fillInputBuffer(numInputFrames);
      if (this.inputBuffer.frameCount < 8192 * 2) {
        break;
      }
      this._pipe.process();
    }
  }
  clear() {
    this._pipe.clear();
  }
}

const noop = function () {
  return;
};

class SimpleFilter extends FilterSupport {
  constructor(sourceSound, pipe, callback = noop) {
    super(pipe);
    this.callback = callback;
    this.sourceSound = sourceSound;
    this.historyBufferSize = 22050;
    this._sourcePosition = 0;
    this.outputBufferPosition = 0;
    this._position = 0;
  }
  get position() {
    return this._position;
  }
  set position(position) {
    if (position > this._position) {
      throw new RangeError('New position may not be greater than current position');
    }
    const newOutputBufferPosition = this.outputBufferPosition - (this._position - position);
    if (newOutputBufferPosition < 0) {
      throw new RangeError('New position falls outside of history buffer');
    }
    this.outputBufferPosition = newOutputBufferPosition;
    this._position = position;
  }
  get sourcePosition() {
    return this._sourcePosition;
  }
  set sourcePosition(sourcePosition) {
    this.clear();
    this._sourcePosition = sourcePosition;
  }
  onEnd() {
    this.callback();
  }
  fillInputBuffer(numFrames = 0) {
    const samples = new Float32Array(numFrames * 2);
    const numFramesExtracted = this.sourceSound.extract(samples, numFrames, this._sourcePosition);
    this._sourcePosition += numFramesExtracted;
    this.inputBuffer.putSamples(samples, 0, numFramesExtracted);
  }
  extract(target, numFrames = 0) {
    this.fillOutputBuffer(this.outputBufferPosition + numFrames);
    const numFramesExtracted = Math.min(numFrames, this.outputBuffer.frameCount - this.outputBufferPosition);
    this.outputBuffer.extract(target, this.outputBufferPosition, numFramesExtracted);
    const currentFrames = this.outputBufferPosition + numFramesExtracted;
    this.outputBufferPosition = Math.min(this.historyBufferSize, currentFrames);
    this.outputBuffer.receive(Math.max(currentFrames - this.historyBufferSize, 0));
    this._position += numFramesExtracted;
    return numFramesExtracted;
  }
  handleSampleData(event) {
    this.extract(event.data, 4096);
  }
  clear() {
    super.clear();
    this.outputBufferPosition = 0;
  }
}

const USE_AUTO_SEQUENCE_LEN = 0;
const DEFAULT_SEQUENCE_MS = USE_AUTO_SEQUENCE_LEN;
const USE_AUTO_SEEKWINDOW_LEN = 0;
const DEFAULT_SEEKWINDOW_MS = USE_AUTO_SEEKWINDOW_LEN;

const AUTOSEEK_AT_MIN = 25.0;
const AUTOSEEK_AT_MAX = 15.0;

  constructor(createBuffers) {

    this.autoSeekSetting = true;

  }

    super.clear();
    this.clearMidBuffer();
  }
  clearMidBuffer() {
    if (this.midBufferDirty) {

    if (sampleRate > 0) {

      this.autoSeqSetting = false;
    } else {
      this.autoSeqSetting = true;
    }
    if (seekWindowMs > 0) {
      this.seekWindowMs = seekWindowMs;
      this.autoSeekSetting = false;
    } else {
      this.autoSeekSetting = true;

<script>

const STEPS = [40,50,60,70,80,90,100];

// Audio state
let audioCtx    = null;
let audioBuffer = null;
let shifter     = null;
let isPlaying   = false;
let playStartTime = 0;
let playStartPos  = 0;
let duration    = 0;

// Tempo
let currentTempo = 100;
let doneTill     = 0;

// Loop state machine: 'idle' | 'waiting_end' | 'active' | 'inactive'
// idle        = geen loop ingesteld
// waiting_end = IN gezet, wachten op OUT
// active      = loop loopt
// inactive    = loop gedefinieerd maar gepauzeerd (reloop beschikbaar)
let loopState = 'idle';
let loopStart = null;
let loopEnd   = null;

let rafId = null;

const $ = id => document.getElementById(id);
const dropZone   = $('dropZone');
const trackCard  = $('trackCard');
const trackTitle = $('trackTitle');
const trackDur   = $('trackDur');
const loadingBar = $('loadingBar');
const statusMsg  = $('statusMsg');
const waveCanvas = $('waveform');
const playheadEl = $('playhead');
const loopRegionEl=$('loopRegion');
const btnPlay    = $('btnPlay');
const iconPlay   = $('iconPlay');
const iconPause  = $('iconPause');
const btnBack    = $('btnBack');
const btnLoop    = $('btnLoop');
const loopHint   = $('loopHint');
const tempoSlider= $('tempoSlider');
const tempoNum   = $('tempoNum');
const stepsEl    = $('steps');
const progressFill=$('progressFill');
const timeCurrent= $('timeCurrent');
const timeTotal  = $('timeTotal');
const waveformWrap=$('waveformWrap');

function fmt(s) {
  s = Math.max(0, s);
  return Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2,"0");
}
function setStatus(msg, err) {
  statusMsg.textContent = msg;
  statusMsg.className = "status-msg" + (err ? " err" : "");
}

// Loop knop visuele staat + hint tekst
function updateLoopUI() {
  btnLoop.className = 'btn-circle';
  switch(loopState) {
    case 'idle':
      loopHint.textContent = '';
      loopHint.className = 'loop-hint';
      loopRegionEl.style.display = 'none';
      break;
    case 'waiting_end':
      btnLoop.classList.add('waiting');  // pulseert
      loopHint.textContent = 'loop einde instellen — druk nogmaals op ↺';
      loopHint.className = 'loop-hint active';
      loopRegionEl.style.display = 'none';
      break;
    case 'active':
      btnLoop.classList.add('active');
      loopHint.textContent = fmt(loopStart) + ' → ' + fmt(loopEnd) + '  ·  tik = pauzeren  ·  lang indrukken = wissen';
      loopHint.className = 'loop-hint active';
      loopRegionEl.style.left  = (loopStart / duration * 100) + '%';
      loopRegionEl.style.width = ((loopEnd - loopStart) / duration * 100) + '%';
      loopRegionEl.style.display = 'block';
      break;
    case 'inactive':
      loopHint.textContent = fmt(loopStart) + ' → ' + fmt(loopEnd) + '  ·  tik = reloop  ·  lang indrukken = wissen';
      loopHint.className = 'loop-hint';
      loopRegionEl.style.left  = (loopStart / duration * 100) + '%';
      loopRegionEl.style.width = ((loopEnd - loopStart) / duration * 100) + '%';
      loopRegionEl.style.display = 'block';
      break;
  }
}

// CDJ-patroon state machine
// Lang indrukken loop-knop = loop clearen
let loopPressTimer = null;
let loopLongPressed = false;
btnLoop.addEventListener('pointerdown', () => {
  loopLongPressed = false;
  loopPressTimer = setTimeout(() => {
    loopLongPressed = true;
    loopState = 'idle'; loopStart = null; loopEnd = null;
    updateLoopUI();
  }, 700);
});
btnLoop.addEventListener('pointerup',     () => clearTimeout(loopPressTimer));
btnLoop.addEventListener('pointercancel', () => clearTimeout(loopPressTimer));

btnLoop.addEventListener('click', () => {
  if (loopLongPressed) return;  // long press al afgehandeld
  if (!audioBuffer) return;
  switch(loopState) {
    case 'idle':
      // 1e druk: stel IN in
      loopStart = getCurrentPos();
      loopEnd   = null;
      loopState = 'waiting_end';
      updateLoopUI();
      break;
    case 'waiting_end':
      // 2e druk: stel OUT in, activeer loop meteen
      loopEnd = getCurrentPos();
      if (loopEnd <= loopStart) {
        // Ongeldige volgorde — reset
        loopState = 'idle';
        loopStart = null; loopEnd = null;
        updateLoopUI();
        setStatus('Loop einde moet ná begin liggen.', true);
        setTimeout(() => setStatus(''), 2000);
        return;
      }
      loopState = 'active';
      updateLoopUI();
      // Spring naar loopStart en speel
      _startShifter(loopStart);
      break;
    case 'active':
      // 3e druk: loop pauzeren (inactive, reloop beschikbaar)
      loopState = 'inactive';
      updateLoopUI();
      break;
    case 'inactive':
      // 4e druk: reloop — spring terug en activeer
      loopState = 'active';
      updateLoopUI();
      if (isPlaying) {
        _startShifter(loopStart);
      } else {
        playStartPos = loopStart;
        playheadEl.style.left = (loopStart / duration * 100) + '%';
        timeCurrent.textContent = fmt(loopStart);
      }
      break;
  }
});

function getCurrentPos() {
  if (!isPlaying) return playStartPos;
  const elapsed = (audioCtx.currentTime - playStartTime) * (currentTempo / 100);
  return Math.min(playStartPos + elapsed, duration);
}

function buildSteps() {
  stepsEl.innerHTML = '';
  STEPS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'step-btn' + (s < doneTill ? ' done' : s === currentTempo ? ' active' : '');
    btn.innerHTML = '<div class="check"><div class="check-dot"></div><svg class="check-svg" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><polyline points="1.5 5 4 7.5 8.5 2.5"/></svg></div><span>' + s + '%</span>';
    btn.onclick = () => setTempo(s);
    stepsEl.appendChild(btn);
  });
  const idx = STEPS.indexOf(doneTill);
  progressFill.style.width = (idx <= 0 ? 0 : (idx / (STEPS.length-1)) * 100) + '%';
}

function setTempo(val) {
  if (isPlaying) playStartPos = getCurrentPos();
  currentTempo = val;
  tempoSlider.value = val;
  tempoNum.textContent = val;
  buildSteps();
  if (isPlaying) _startShifter(playStartPos);
}

tempoSlider.addEventListener('input', () => setTempo(parseInt(tempoSlider.value)));

function drawWaveform(buffer) {
  const dpr = window.devicePixelRatio || 1;
  const w = waveCanvas.offsetWidth || 400;
  const h = 56;
  waveCanvas.width = w * dpr;
  waveCanvas.height = h * dpr;
  const ctx = waveCanvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  ctx.fillStyle = '#18181a';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < w; i++) {
    let min = 0, max = 0;
    for (let j = 0; j < step; j++) {
      const v = data[i*step+j] || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    ctx.fillStyle = '#3a3a3e';
    ctx.fillRect(i, (0.5 - max*0.45)*h, 1, Math.max(1, (max-min)*0.9*h));
  }
}

function _stopShifter() {
  if (shifter) { try { shifter.disconnect(); } catch(e){} shifter = null; }
  if (rafId)   { cancelAnimationFrame(rafId); rafId = null; }
}

function _startShifter(fromPos) {
  _stopShifter();
  if (!audioBuffer || !audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  fromPos = Math.max(0, Math.min(fromPos, duration - 0.1));

  const sr          = audioBuffer.sampleRate;
  const startSample = Math.floor(fromPos * sr);
  const remaining   = audioBuffer.length - startSample;
  let bufToPlay     = audioBuffer;
  if (startSample > 0 && remaining > 0) {
    bufToPlay = audioCtx.createBuffer(audioBuffer.numberOfChannels, remaining, sr);
    for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
      bufToPlay.copyToChannel(audioBuffer.getChannelData(ch).subarray(startSample), ch);
    }
  }

  try {
    shifter = new PitchShifter(audioCtx, bufToPlay, 4096, () => {
      isPlaying = false;
      // Bepaal herstart-positie na einde
      if (loopState === 'active') {
        playStartPos = loopStart;
      } else {
        playStartPos = 0;
      }
      updatePlayUI(false);
      playheadEl.style.left = (playStartPos / duration * 100) + '%';
      timeCurrent.textContent = fmt(playStartPos);
    });
    shifter.tempo = currentTempo / 100;
    shifter.connect(audioCtx.destination);
    playStartTime = audioCtx.currentTime;
    playStartPos  = fromPos;
    isPlaying     = true;
    updatePlayUI(true);
    rafId = requestAnimationFrame(tick);
    setStatus('');
  } catch(e) {
    setStatus('Fout: ' + e.message, true);
    console.error(e);
  }
}

function stopAudio(keepPos) {
  const pos = getCurrentPos();
  _stopShifter();
  isPlaying = false;
  playStartPos = keepPos ? pos : 0;
  updatePlayUI(false);
}

function tick() {
  if (!isPlaying) return;
  const pos = getCurrentPos();
  playheadEl.style.left = (Math.min(pos/duration, 1) * 100) + '%';
  timeCurrent.textContent = fmt(pos);

  // Loop check — alleen als state 'active' is
  if (loopState === 'active' && loopStart !== null && loopEnd !== null) {
    if (pos >= loopEnd) {
      _startShifter(loopStart);
      return;
    }
  }
  if (pos >= duration - 0.1) return;
  rafId = requestAnimationFrame(tick);
}

function updatePlayUI(playing) {
  iconPlay.style.display  = playing ? 'none' : 'block';
  iconPause.style.display = playing ? 'block' : 'none';
}

btnPlay.addEventListener('click', () => {
  if (!audioBuffer) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (isPlaying) {
    stopAudio(true);
  } else {
    let startAt = playStartPos;
    if (loopState === 'active' && loopStart !== null && loopEnd !== null) {
      if (startAt < loopStart || startAt >= loopEnd) startAt = loopStart;
    }
    _startShifter(startAt);
  }
});

btnBack.addEventListener('click', () => {
  const newPos = Math.max(0, getCurrentPos() - 10);
  if (isPlaying) _startShifter(newPos);
  else {
    playStartPos = newPos;
    playheadEl.style.left = (newPos/duration*100) + '%';
    timeCurrent.textContent = fmt(newPos);
  }
});

waveformWrap.addEventListener('click', e => {
  if (!audioBuffer) return;
  const rect = waveformWrap.getBoundingClientRect();
  const pos  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * duration;
  if (isPlaying) _startShifter(pos);
  else {
    playStartPos = pos;
    playheadEl.style.left = (pos/duration*100) + '%';
    timeCurrent.textContent = fmt(pos);
  }
});

// Lang indrukken play = markeer tempo als geoefend
let pressTimer = null;
btnPlay.addEventListener('pointerdown', () => {
  pressTimer = setTimeout(() => { if (currentTempo > doneTill) { doneTill = currentTempo; buildSteps(); } }, 800);
});
btnPlay.addEventListener('pointerup',     () => clearTimeout(pressTimer));
btnPlay.addEventListener('pointercancel', () => clearTimeout(pressTimer));

async function loadFile(file) {
  const audioExts = /\.(mp3|m4a|aac|wav|ogg|flac|mp4|aiff|wma)$/i;
  if (!file || (!file.type.startsWith('audio') && !file.type.startsWith('video/mp4') && !audioExts.test(file.name))) {
    setStatus('Geen geldig audiobestand.', true); return;
  }
  stopAudio(false);
  loopState = 'idle'; loopStart = null; loopEnd = null; doneTill = 0;
  updateLoopUI();

  trackTitle.textContent = file.name.replace(/\.[^.]+$/, '');
  trackCard.classList.add('visible');
  dropZone.style.display = 'none';
  btnPlay.disabled = true;
  loadingBar.style.width = '30%';
  setStatus('Bestand laden…');

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  try {
    const ab = await file.arrayBuffer();
    loadingBar.style.width = '70%';
    audioBuffer = await audioCtx.decodeAudioData(ab);
    duration = audioBuffer.duration;
    trackDur.textContent = fmt(duration) + ' · ' + (file.size/1024/1024).toFixed(1) + ' MB';
    timeTotal.textContent = fmt(duration);
    timeCurrent.textContent = '0:00';
    playheadEl.style.left = '0%';
    setTimeout(() => drawWaveform(audioBuffer), 50);
    buildSteps();
    setTempo(currentTempo);
    btnPlay.disabled = false;
    loadingBar.style.width = '0%';
    setStatus('');
    updatePlayUI(false);
  } catch(e) {
    setStatus('Kon bestand niet laden: ' + e.message, true);
    loadingBar.style.width = '0%';
  }
}

$('fileInput').addEventListener('change',  e => loadFile(e.target.files[0]));
$('fileInput2').addEventListener('change', e => loadFile(e.target.files[0]));
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); loadFile(e.dataTransfer.files[0]); });
window.addEventListener('resize', () => { if (audioBuffer) drawWaveform(audioBuffer); });

</script>
</body>
